<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Picture Upload</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    text-align:center;
    width:340px;
}

.preview{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #ddd;
    margin-bottom:20px;
}

input[type=file]{
    display:none;
}

.choose-btn{
    display:inline-block;
    padding:10px 18px;
    background:#e5e5e5;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:15px;
}

.upload-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

.upload-btn:hover{
    background:#1d4ed8;
}

#status{
    margin-top:15px;
    color:#555;
    font-size:14px;
}
</style>

</head>
<body>

<div class="card">

    <img
        id="preview"
        class="preview"
        src="/pictures/profile/default-avatar.png"
        alt="Profile Picture">

    <form id="uploadForm" enctype="multipart/form-data">

        <label class="choose-btn" for="profilePic">
            Choose Picture
        </label>

        <input
            type="file"
            id="profilePic"
            name="profilePic"
            accept="image/png,image/jpeg,image/webp">

        <button class="upload-btn" type="submit">
            Upload
        </button>
    </form>
    <p id="status"></p>
</div>

<script>
const input = document.getElementById("profilePic");
const preview = document.getElementById("preview");
const form = document.getElementById("uploadForm");
const status = document.getElementById("status");

input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
});


form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const file = input.files[0];
    if (!file) {
        status.textContent = "Please choose an image.";
        return;
    }
    try { 
        const req = await fetch("/api/profile/picture", {
            method: "POST",
            headers: {
    "Content-Type": "image/jpeg"
  },
            body: file
        });
        const res = await req.json();
        if(res.success) {
        status.textContent = res.success;
        setTimeout(()=> {
        window.location.href = '/profile';
        },1000);
        return;
        }
        if(res.error) {
        status.textContent = res.error;
        return;
        }

        if (!res.ok) {
            throw new Error("Upload failed");
        }
    } catch (err) {
        status.textContent = err.message;
    }
});
</script>

</body>
</html>
