<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#eef2f7;
    color:#222;
}

/* Header */

header{
    background:#fff;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 6%;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    color:#2563eb;
}

nav{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

nav a:hover{
    text-decoration:underline;
}

/* Main */

.container{
    width:min(850px,95%);
    margin:40px auto;
}

/* Card */

.card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card h3{
    font-size:28px;
    margin-bottom:25px;
}

/* Labels */

.meta{
    font-weight:600;
    margin:20px 0 8px;
    color:#555;
}

/* Inputs */

input,
textarea,
select{
    width:100%;
    padding:14px 16px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:16px;
    font-family:inherit;
    background:#fff;
    outline:none;
    transition:.2s;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

textarea{
    min-height:220px;
    resize:vertical;
    line-height:1.7;
    overflow-wrap:anywhere;
    word-break:break-word;
}

/* Button */

button{
    margin-top:28px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#1d4ed8;
}

/* Mobile */

@media(max-width:700px){

header{
    flex-direction:column;
    gap:14px;
    text-align:center;
}

.logo{
    font-size:24px;
}

.card{
    padding:20px;
}

.card h3{
    font-size:24px;
}

}
</style>

</head>

<body>

<header>
  <div class="logo">Create Post</div>
  <nav>
    <a href="/">Home</a>
    <a href="/profile">Profile</a>
    <a href="/logout">Logout</a>
  </nav>
</header>

<div class="container">

  <!-- MAIN CONTENT -->
  <div class="card">
    <h3>Create New Post</h3>

    <div class="meta">Post Title</div>
    <input type="text" id="title" placeholder="Enter post title" required>
    
    <div class="meta">
    <select id='catlists'>
</select>
</div>


    <div class="meta">Post Body</div>
    <textarea id="body" placeholder="Write your post..." required></textarea>

    <button onclick="post()">Submit Post</button>
  </div>

</div>

<script>
let catlists = document.getElementById('catlists');
let path = window.location.pathname.split('/'); //array paths

async function catlist() {
   try {
 const req = await fetch('/api/category/lists');
 const res = await req.json();
 if(res.error) {
 const option = document.createElement('option');
 option.value = '';
 option.selected = true;
 option.disabled = true;
    option.textContent = res.error;
    catlists.appendChild(option);
    return;
    }
 for(const i of res) {
 if(i.catName !== path[2]) {
 continue;
 }
   const option = document.createElement('option');
   option.value = i.catId;
   option.textContent = i.catName;
   catlists.appendChild(option);
   }
   } catch(err) {
   alert(err);
   }
   return;
   }

async function post() {
  const titleP = document.getElementById('title').value;
  const postB = document.getElementById('body').value;
  const date = new Date().toISOString(); //returns UTC timezone ISO 8601 Format
 

  const data = {
    post: {
      titleP,
      catId: catlists.value,
      postB, 
      date
    }
  };

  try {
    const req = await fetch('/api/post', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });
    

    const res = await req.json();
    
    
    if (res.status) {
      alert(res.status);
      return;
    }

    if (res.error) {
      alert(res.error);
      return;
    }
   
  } catch (err) {
    alert(err);
  }
}
catlist();
</script>

</body>
</html>
