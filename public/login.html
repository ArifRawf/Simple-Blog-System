<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.login-box{
    width:350px;
    background:#ffffff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
    color:#111827;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    color:#374151;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.input-group input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

#msg{
    margin-top:15px;
    text-align:center;
    color:#374151;
}
</style>
</head>
<body>

<div class="login-box">
    <h1>Login</h1>

    <form id="loginForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <p id="msg"></p>
</div>

<script>
const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        const data = await response.json();
if(data.success) {
        msg.textContent = data.success;
        return;
        }
   
  if(data.error) {
  msg.textContent = data.error;
  return;
 }

    } catch(err) {
        msg.textContent = err;
    }
});
</script>

</body>
</html>
