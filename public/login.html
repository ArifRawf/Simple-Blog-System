<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#eef2f7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:#1f2937;
}

/* Login Card */

.login-box{
    width:100%;
    max-width:430px;
    background:#fff;
    border:1px solid #dbe2ea;
    border-radius:18px;
    padding:35px;
    box-shadow:0 12px 35px rgba(0,0,0,.08);
}

/* Heading */

.login-box h1{
    text-align:center;
    font-size:32px;
    color:#2563eb;
    margin-bottom:30px;
}

/* Form */

form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    font-size:15px;
    font-weight:600;
    color:#374151;
}

.input-group input{
    width:100%;
    padding:14px 16px;
    font-size:16px;
    font-family:inherit;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
    transition:.2s;
}

.input-group input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* Button */

button{
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#1d4ed8;
}

/* Message */

#msg{
    margin-top:20px;
    text-align:center;
    font-weight:600;
    min-height:24px;
    color:#2563eb;
    overflow-wrap:anywhere;
    word-break:break-word;
}

/* Mobile */

@media(max-width:500px){

.login-box{
    padding:25px;
}

.login-box h1{
    font-size:28px;
}

}
</style>
</head>
<body>

<div class="login-box">
    <h1>Login</h1>

    <form id="loginForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <p id="msg"></p>
</div>

<script>
const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        const data = await response.json();
if(data.success) {
        msg.textContent = data.success;
        setTimeout(()=>{
        return window.location.href = '/';
        },1000);
        }
   
  if(data.error) {
  msg.textContent = data.error;
  return;
 }

    } catch(err) {
        msg.textContent = err;
    }
});
</script>

</body>
</html>
