<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#eef2f7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:#1f2937;
}

/* Register Card */

.container{
    width:100%;
    max-width:430px;
    background:#fff;
    border:1px solid #dbe2ea;
    border-radius:18px;
    padding:35px;
    box-shadow:0 12px 35px rgba(0,0,0,.08);
}

/* Heading */

.container h2{
    text-align:center;
    font-size:32px;
    color:#2563eb;
    margin-bottom:30px;
}

/* Form */

form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

input{
    width:100%;
    padding:14px 16px;
    font-size:16px;
    font-family:inherit;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* Button */

button{
    margin-top:8px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#1d4ed8;
}

/* Message */

#msg{
    margin-top:20px;
    min-height:24px;
    text-align:center;
    font-weight:600;
    overflow-wrap:anywhere;
    word-break:break-word;
}

.success{
    color:#16a34a;
}

.error{
    color:#dc2626;
}

/* Footer Text */

.container p{
    margin-top:25px;
    text-align:center;
    color:#6b7280;
    font-size:15px;
}

.container a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.container a:hover{
    text-decoration:underline;
}

/* Mobile */

@media(max-width:500px){

.container{
    padding:25px;
}

.container h2{
    font-size:28px;
}

}
</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form id="registerForm">

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button>Create Account</button>

</form>

<div id="msg"></div>

<p>
Already have an account?
<a href="/login.html">Login</a>
</p>

</div>

<script>

const form=document.getElementById("registerForm");
const msg=document.getElementById("msg");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

msg.textContent="";
msg.className="";

const data={
    userid:Date.now(),
    username:document.getElementById("username").value.trim(),
    password:document.getElementById("password").value,
    role:"user",
    pdate:new Date().toISOString()
};

try{

const res=await fetch("/register",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
});

const result=await res.json();

if(result.success){

msg.className="success";
msg.textContent=result.success;

setTimeout(()=>{
    window.location.href="/login.html";
},1200);

}else{

msg.className="error";
msg.textContent=result.error;

}

}catch(err){

msg.className="error";
msg.textContent="Network Error";

}

});

</script>

</body>
</html>
