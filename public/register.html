<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }

        /* Split Screen Container */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Left Side: Aesthetic Visual Panel */
        .visual-panel {
            flex: 1;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
        }

        .visual-panel::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -50px;
            left: -50px;
            filter: blur(40px);
        }

        .visual-title {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-text {
            font-size: 1.1rem;
            color: #e2e8f0;
            max-width: 450px;
            line-height: 1.6;
        }

        /* Right Side: Form Panel */
        .form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            padding: 40px;
        }

        .form-card {
            width: 100%;
            max-width: 420px;
        }

        .form-header {
            margin-bottom: 32px;
        }

        .form-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .form-header a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
        }

        .form-header a:hover {
            text-decoration: underline;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #6366f1;
            background: #0f172a;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* Terms Checkbox */
        .terms-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .terms-container input {
            width: 18px;
            height: 18px;
            accent-color: #6366f1;
            cursor: pointer;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .visual-panel {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Visual Sidebar -->
        <div class="visual-panel">
            <h1 class="visual-title">Discover the next level of creativity.</h1>
            <p class="visual-text">Join thousands of creators managing their workflows, assets, and collaborations flawlessly in one beautiful dashboard.</p>
        </div>

        <!-- Registration Form Panel -->
        <div class="form-panel">
            <div class="form-card">
                <div class="form-header">
                    <h2>Get started</h2>
                    <p>Already have an account? <a href="/login.html">Sign in</a> | <a href="/">Home</a></p>
                </div>

                <form autocomplete="off">
                    <div class="input-group">
                        <label for="name">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="name" placeholder="Arman,Arman123,arman123,ARMAN123" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="bio">Bio</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="whats on your mind?" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="terms-container">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
                    </div>

                    <button type="submit" class="btn-submit">Create Account</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
