<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>


<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#eef2f7;
    color:#222;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px 15px;
}

/* Profile Card */

.profile-card{
    width:100%;
    max-width:600px;
    background:#fff;
    border:1px solid #dbe2ea;
    border-radius:16px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* Heading */

.profile-card h1{
    text-align:center;
    font-size:30px;
    margin-bottom:25px;
    color:#2563eb;
}

/* Avatar */

.preview{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #2563eb;
    background:#f3f4f6;
    margin-bottom:30px;
}

/* Profile Info */

#profile{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.info{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    padding:15px 18px;
    border:1px solid #e5e7eb;
    border-radius:12px;
    background:#fafafa;
}

.label{
    font-weight:700;
    color:#444;
}

.value{
    color:#666;
    text-align:right;
    overflow-wrap:anywhere;
    word-break:break-word;
}

/* Loading */

.loading{
    text-align:center;
    color:#888;
    padding:30px 0;
}

/* Error */

.error{
    text-align:center;
    color:#dc2626;
    background:#fee2e2;
    border:1px solid #fecaca;
    padding:15px;
    border-radius:10px;
    font-weight:600;
}

/* Mobile */

@media(max-width:600px){

.profile-card{
    padding:20px;
}

.profile-card h1{
    font-size:24px;
}

.preview{
    width:110px;
    height:110px;
}

.info{
    flex-direction:column;
    align-items:flex-start;
}

.value{
    text-align:left;
}

}
</style>
</head>
<body>

<div class="profile-card">

    <h1>Profile</h1>
    <center>
    <img
        id="preview"
        class="preview"
        src="/pictures/profile/default-avatar.png"
        alt="Profile Picture">{{change}}
</center>
    <div id="profile">
        <div class="loading">Loading...</div>
    </div>

</div>

<script>
const preview = document.getElementById("preview");
async function loadProfile() {

    const segment = window.location.pathname.split('/');
    const getUserName = segment[2];

    try {
        const req = await fetch(`/api/profile/${getUserName}`);
        const res = await req.json();

        if (res.error) {
            throw new Error(res.error);
        }

        const profile = document.getElementById("profile");
        profile.textContent = "";

        addInfo(profile, "Username", res.username);
        addInfo(profile, "User ID", res.userid);
        addInfo(profile, "Created", new Date(res.pdate).toLocaleDateString());
        addInfo(profile, "Role", res.role);
preview.src = res.profilePic || '/pictures/profile/default-avatar.png';
    } catch (err) {

        const profile = document.getElementById("profile");
        profile.textContent = "";

        const error = document.createElement("div");
        error.className = "error";
        error.textContent = err.message;

        profile.appendChild(error);
    }
}

function addInfo(parent, labelText, valueText) {

    const info = document.createElement("div");
    info.className = "info";

    const label = document.createElement("span");
    label.className = "label";
    label.textContent = labelText;

    const value = document.createElement("span");
    value.className = "value";
    value.textContent = valueText;

    info.appendChild(label);
    info.appendChild(value);

    parent.appendChild(info);
}

loadProfile();

</script>

</body>
</html>
