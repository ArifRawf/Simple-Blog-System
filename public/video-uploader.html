<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Upload</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    margin-bottom:20px;
}

video{
    width:100%;
    display:none;
    border-radius:8px;
    background:#000;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:#fff;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#status{
    margin-top:15px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h2>Upload Video</h2>

<input type="file" id="videoInput" accept="video/*">

<video id="preview" controls></video>

<button id="uploadBtn">Upload</button>

<p id="status"></p>

</div>

<script>
const input = document.getElementById("videoInput");
const preview = document.getElementById("preview");
const status = document.getElementById("status");

input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;

    // Show video instantly in browser
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
    preview.load();
});

document.getElementById("uploadBtn").addEventListener("click", async () => {

    const file = input.files[0];

    if (!file) {
        status.textContent = "Please select a video first.";
        return;
    }

    status.textContent = "";

    try {

        const req = await fetch("/api/upload-video", {
            method: "POST",
            headers: {
                "Content-Type": "application/octet-stream",
                "x-file-name": file.name
            },
            body: file
        });

        const res = await req.json();

        status.textContent = res.status;

    } catch (err) {
        status.textContent = res.error || err.message;
    }

});
</script>

</body>
</html>
