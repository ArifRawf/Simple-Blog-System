<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Posts</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#eef2f7;
    color:#222;
}

/* Container */

.container{
    width:min(1000px,95%);
    margin:40px auto;
}

/* Heading */

h1{
    font-size:34px;
    margin-bottom:25px;
    color:#2563eb;
    word-break:break-word;
}

/* Add Post Link */

.container>a{
    display:inline-block;
    margin-bottom:25px;
    padding:10px 18px;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:.2s;
}

.container>a:hover{
    background:#1d4ed8;
}

/* Post Card */

.post{
    background:#fff;
    border:1px solid #dbe2ea;
    border-radius:16px;
    padding:24px;
    margin-bottom:18px;
    box-shadow:0 8px 24px rgba(0,0,0,.06);
    transition:.25s;
    overflow:hidden;
}

.post:hover{
    transform:translateY(-3px);
    border-color:#2563eb;
}

.post h2{
    font-size:24px;
    margin-bottom:10px;
    color:#111827;
    overflow-wrap:anywhere;
    word-break:break-word;
}

.meta{
    font-size:14px;
    color:#6b7280;
    margin-bottom:14px;
    overflow-wrap:anywhere;
}

.post p{
    color:#4b5563;
    line-height:1.7;
    overflow-wrap:anywhere;
    word-break:break-word;
}

/* Buttons */

#prev,
#next,
.btn{
    width:38px;
    height:38px;
    border:none;
    border-radius:10px;
    background:#fff;
    border:1px solid #d1d5db;
    cursor:pointer;
    font-weight:700;
    transition:.2s;
    margin:4px;
}

#prev,
#next{
    width:auto;
    padding:0 16px;
}

#prev:hover,
#next:hover,
.btn:hover{
    background:#2563eb;
    color:#fff;
    border-color:#2563eb;
}

/* Pagination */

#pagination{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:20px;
}

/* Responsive */

@media(max-width:700px){

.container{
    width:95%;
}

h1{
    font-size:28px;
}

.post{
    padding:18px;
}

.post h2{
    font-size:20px;
}

}
</style>
</head>
<body>

<div class="container" id='container'>

    <h1><span id='catposts'></span></h1>
{{addpost}}
<div id='posts'></div>
<button id="prev">Prev</button>
<button id="next">Next</button>
<div id="pagination"></div>
</div>

    
<script>
   let page = 1; //default state
   const next = document.getElementById('next');
const prev = document.getElementById('prev');
function pageNextPrev(res,page) {
if(page > 1) {
     prev.onclick = () => {
     categoryPosts(page - 1);
     }
     }
     if(page < res.paging.totalpages) {
     next.onclick = () => {
     categoryPosts(page + 1);
     }
     }
     }
    
//paging helper function
function paging(res) {
const pagination = document.getElementById('pagination');
  pagination.innerHTML = '';
  for(let i = 1; i <= res.paging.totalpages; i++) {
  const btn = document.createElement('button');
  btn.classList.add('btn');
    btn.innerHTML = i;
    btn.onclick = () => { categoryPosts(i); }
pagination.appendChild(btn);
    }
}
async function categoryPosts(page) {
try{
     const path = window.location.pathname.split('/')[2];
     const divCon = document.getElementById('posts');
     divCon.textContent = '';
     document.getElementById('catposts').textContent = path + ' posts';
    const req = await fetch(`/api/category/${path}?page=${page}`);
    const res = await req.json();
    if(res.error) {
    const divPost = document.createElement('div');
divPost.classList.add('post');
divPost.textContent = res.error;
divCon.appendChild(divPost);
    return;
    }
    for (const i of res.posts) {
    const divPost = document.createElement('div');
    divPost.classList.add('post');

    const h2 = document.createElement('h2');

    const divMeta = document.createElement('div');
    divMeta.classList.add('meta');

    const p = document.createElement('p');

    h2.textContent = i.title;
    divMeta.textContent = `Author: ${i.author}, Date: ${i.date}`;
    p.textContent = i.excerpts;

    divPost.append(h2, divMeta, p);
    divCon.appendChild(divPost);
}
paging(res);
  pageNextPrev(res,page);
}catch(err) {
alert(err);
}
    
   }
   categoryPosts(page);
</script>
</body>
</html>
