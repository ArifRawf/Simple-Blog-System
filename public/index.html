<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - Blog UI</title>

  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#eef2f7;
    color:#222;
    line-height:1.7;
}

/* ---------- Header ---------- */

header{
    background:#fff;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 6%;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    color:#2563eb;
}

nav{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

/* ---------- Layout ---------- */

.container{
    width:min(1300px,95%);
    margin:30px auto;
    display:grid;
    grid-template-columns:2.5fr 340px;
    gap:30px;
}

.sidebar{
    position:sticky;
    top:90px;
    height:fit-content;
}

/* ---------- Titles ---------- */

.section-title{
    font-size:22px;
    font-weight:700;
    margin-bottom:18px;
}

/* ---------- Cards ---------- */

.card{
    background:#fff;
    border-radius:14px;
    border:1px solid #ddd;
    padding:24px;
    margin-bottom:18px;
    transition:.25s;
    overflow:hidden;
}

.card:hover{
    border-color:#2563eb;
    transform:translateY(-2px);
}

.card h3{
    font-size:24px;
    margin-bottom:10px;

    word-break:break-word;
    overflow-wrap:anywhere;
}

.card p{
    color:#555;
    overflow-wrap:anywhere;
    word-break:break-word;
}

.meta{
    margin-top:15px;
    color:#888;
    font-size:14px;
    overflow-wrap:anywhere;
}

/* ---------- Read More ---------- */

.excerpts a{
    color:#2563eb;
    text-decoration:none;
    font-weight:700;
    margin-left:8px;
}

.excerpts a:hover{
    text-decoration:underline;
}

/* ---------- Category ---------- */

#catlists{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

#catlists a{
    text-decoration:none;
}

.tag{
    display:inline-block;
    padding:8px 14px;
    background:#edf4ff;
    color:#2563eb;
    border-radius:8px;
    font-size:14px;
    transition:.2s;
}

.tag:hover{
    background:#2563eb;
    color:#fff;
}

/* ---------- Buttons ---------- */

.btn{
    width:34px;
    height:34px;
    border-radius:8px;
    border:1px solid #d0d7de;
    background:#fff;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
}

.btn:hover{
    background:#2563eb;
    color:#fff;
    border-color:#2563eb;
}

#pagination{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:18px;
}

/* ---------- Footer ---------- */

footer{
    margin-top:40px;
    text-align:center;
    padding:25px;
    color:#777;
}

/* ---------- Responsive ---------- */

@media(max-width:950px){

.container{
    grid-template-columns:1fr;
}

.sidebar{
    position:static;
}

header{
    flex-direction:column;
    gap:12px;
    text-align:center;
}

}

@media(max-width:600px){

.container{
    width:96%;
}

.card{
    padding:18px;
}

.card h3{
    font-size:20px;
}

.logo{
    font-size:22px;
}

.section-title{
    font-size:20px;
}

}
</style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">My Nodejs Blog</div>
    <nav>Hello {{user}}, 
      {{HEAD_SECTION_CHECK}}
    </nav>
  </header>

  <!-- Main Content -->
  <div class="container">

    <!-- Latest Posts -->
    <div class="main">
      <div class="section-title">Latest Posts</div>
      <div id='latestPosts'></div>
<button id='prev' class='btn'>Prev</button><button id='next' class='btn'>Next</button><div id="pagination"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

      <div class="section-title">Categories</div>

      <div class="card" id='catlists'>
      </div>

      <div class="section-title">Trending</div>

      <div class="card">
        <p> JWT Authentication basics</p>
        <p> REST API structure tips</p>
        <p> File handling in Node.js</p>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <footer>
    © 2026 MyBlog. All rights reserved.
  </footer>

<script>
let page = 1; //default state for paginate 
const next = document.getElementById('next');
const prev = document.getElementById('prev');
//next prev paging 
function pageNextPrev(res,page) {
if(page > 1) {
     prev.onclick = () => {
     latestPosts(page - 1);
     }
     }
     if(page < res.paging.totalpages) {
     next.onclick = () => {
     latestPosts(page + 1);
     }
     }
     }
    
//paging helper function
function paging(res) {
const pagination = document.getElementById('pagination');
  pagination.innerHTML = '';
  for(let i = 1; i <= res.paging.totalpages; i++) {
  const btn = document.createElement('button');
  btn.classList.add('btn');
    btn.innerHTML = i;
    btn.onclick = () => { latestPosts(i); }
pagination.appendChild(btn);
    }
}
//time ago formatting
function timeAgo(isoDate) {
  const now = new Date();
  const past = new Date(isoDate);

  const diff = Math.floor((now - past) / 1000); // seconds

  if (diff < 60) {
    return `${diff} seconds ago`;
  }
  const minutes = Math.floor(diff / 60);
  if (minutes < 60) {
    return `${minutes} minutes ago`;
  }

  const hours = Math.floor(minutes / 60);
  if (hours < 24) {
    return `${hours} hours ago`;
  }
  const days = Math.floor(hours / 24);
  if(days === 1) {
  return `${days} day ago`;
  }
  if (days < 30) {
    return `${days} days ago`;
  }

  const months = Math.floor(days / 30);
  if (months < 12) {
    return `${months} months ago`;
  }

  const years = Math.floor(months / 12);
  return `${years} years ago`;
}

//category listing
async function catlists() {
   try {
 const req = await fetch('/api/category/lists');
 const res = await req.json();
 const catlists = document.getElementById('catlists');
 if(res.error) {
    return catlists.textContent = res.error;
    }
 for(const i of res) {
   const span = document.createElement('span');
   const a = document.createElement('a');
   span.classList.add('tag');
   a.href = `/category/${i.catName}`;
   span.textContent = i.catName;
   a.appendChild(span);
   catlists.appendChild(a);
   }
   } catch(err) {
   alert(err);
   }
   }
 
//fetching Latest Posts with vanilla javascript
async function latestPosts(page){
try{
const req = await fetch(`/api/latestposts?page=${page}`);
const res = await req.json();
const div_main = document.getElementById('latestPosts');
div_main.innerHTML = '';
//get all posts from res
//if errorobj exist
if(res.error) {
const div_card = document.createElement('div');
  const h3 = document.createElement('h3');
  div_card.classList.add('card');
  h3.textContent = res.error;
  div_card.appendChild(h3);
  div_main.appendChild(div_card);
  return;
  }
  
for(const post of res.posts) {
  const div_card = document.createElement('div');
  const div_meta = document.createElement('div');
  const p = document.createElement('p');
  const h3 = document.createElement('h3');
  const a = document.createElement('a');
  div_meta.classList.add('meta');
  div_card.classList.add('card');
  a.href = `/post/${post.id}`;
  a.textContent = 'read more';
  p.classList.add('excerpts');
  p.textContent = post.excerpts;
  h3.textContent = post.title;
  div_meta.textContent = `By ${post.author},In ${post.cat}, Created: ${timeAgo(post.date)}`;
  p.appendChild(a);
  div_card.append(h3, p, div_meta);
  div_main.appendChild(div_card);
  }
  //pagination right after posts
  paging(res);
  pageNextPrev(res,page);
  
  }catch(err) {
  alert(err);
  }  
}
latestPosts(page);
catlists();
</script>


</body>
</html>
