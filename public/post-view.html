<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#eef2f7;
    color:#1f2937;
    line-height:1.8;
    padding:40px 15px;
}

/* Main Container */

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border:1px solid #dbe2ea;
    border-radius:18px;
    padding:40px;
    box-shadow:0 12px 35px rgba(0,0,0,.07);
}

/* Header */

.header{
    border-bottom:1px solid #e5e7eb;
    padding-bottom:25px;
    margin-bottom:30px;
}

#title{
    font-size:38px;
    line-height:1.3;
    margin-bottom:25px;
    color:#111827;
    overflow-wrap:anywhere;
    word-break:break-word;
}

/* Author */

.author-box{
    display:flex;
    align-items:center;
    gap:16px;
}

#profilePic{
    width:64px;
    height:64px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #2563eb;
    background:#f3f4f6;
}

.author-info h3{
    font-size:18px;
    margin-bottom:4px;
    color:#111827;
    overflow-wrap:anywhere;
}

.author-info p{
    color:#6b7280;
    font-size:14px;
}

/* Content */

.content{
    font-size:18px;
    color:#374151;
    white-space:pre-wrap;
    overflow-wrap:anywhere;
    word-break:break-word;
}

/* Loading / Error */

.loading{
    max-width:700px;
    margin:80px auto;
    text-align:center;
    background:#fff;
    padding:40px;
    border-radius:16px;
    border:1px solid #dbe2ea;
    box-shadow:0 8px 24px rgba(0,0,0,.06);
}

.loading h2{
    color:#dc2626;
}

/* Responsive */

@media(max-width:700px){

.container{
    padding:25px;
}

#title{
    font-size:30px;
}

.author-box{
    align-items:flex-start;
}

#profilePic{
    width:56px;
    height:56px;
}

.content{
    font-size:16px;
}

}

@media(max-width:480px){

.container{
    padding:20px;
}

#title{
    font-size:25px;
}

.author-box{
    flex-direction:column;
    align-items:flex-start;
}

}
</style>


</head>
<body>

<div class="container">

    <div class="header">

        <h1 id="title">Loading...</h1>

        <div class="author-box">

            <!-- Sample Profile Picture -->
            <img id="profilePic"
                 src="https://i.pravatar.cc/80"
                 alt="Profile Picture">

            <div class="author-info">
                <h3 id="author">Loading...</h3>
                <p id='role'></p>
                <p id="date"></p>
            </div>

        </div>

    </div>

    <div class="content" id="body">
        Loading...
    </div>

</div>

<script>

const postid = location.pathname.split('/')[2];

async function loadPost(){

    try{

        const response = await fetch(`/api/postview/${postid}`);
        const post = await response.json();

        if(post.error){
            document.body.innerHTML = `<div class="loading">${post.error}</div>`;
            return;
        }

        document.title = post.title;

        document.getElementById("title").textContent = post.title;
        document.getElementById("author").innerHTML = `<a href='/profile/${post.author}'>${post.author}</a>`;
        document.getElementById("date").textContent = post.date;
        document.getElementById("body").textContent = post.body;
        document.getElementById("role").textContent = post.role;
        document.getElementById("profilePic").src = post.profilePic;
        

        // Later you can use:
        // document.getElementById("profilePic").src = post.profilePic;

    }catch(err){

        document.body.innerHTML =
        `<div class="loading">
            <h2>${err.message}</h2>
        </div>`;

    }

}

loadPost();

</script>

</body>
</html>
